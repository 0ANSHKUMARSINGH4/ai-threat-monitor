version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: ratelimiter-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ratelimiter
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ratelimiter-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mysql_data:
