spring:
  security:
    user:
      name: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD:admin123}
  application:
    name: ratelimiter-ai-backend
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1
      idle-timeout: 300000
      connection-timeout: 30000
      pool-name: RenderPostgresPool
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        temp:
          use_jdbc_metadata_defaults: false
    open-in-view: false
  sql:
    init:
      mode: never
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 5000

ai:
  groq:
    api-url: https://api.groq.com/openai/v1/chat/completions
    api-key: ${AI_API_KEY:default-mock-key}
    model: llama3-8b-8192

logging:
  level:
    root: INFO
    com.ratelimit.ai: DEBUG
    org.hibernate.SQL: INFO

cors:
  allowed:
    origin: ${CORS_ALLOWED_ORIGIN}

server:
  port: ${PORT:8080}
