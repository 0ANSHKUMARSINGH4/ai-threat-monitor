spring:
  security:
    user:
      name: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD:admin123}
  application:
    name: ratelimiter-ai-backend
  # datasource configuration is now handled programmatically in com.ratelimit.ai.config.DatabaseConfig
  # for better Render environment compatibility.
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        temp:
          use_jdbc_metadata_defaults: false
    # Prevent crashing if DB is unavailable during bean scanning
    open-in-view: false
  
  sql:
    init:
      mode: never
  
  data:
    redis:
      # Strictly use the mapped Render Redis host
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000

# Custom logic for AI module
ai:
  groq:
    api-url: https://api.groq.com/openai/v1/chat/completions
    api-key: ${AI_API_KEY:default-mock-key}
    model: llama3-8b-8192

logging:
  level:
    root: INFO
    com.ratelimit.ai: DEBUG
    org.hibernate.SQL: INFO

cors:
  allowed:
    origin: ${CORS_ALLOWED_ORIGIN}

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-exception: true
    include-stacktrace: always

management:
  endpoints:
    web:
      exposure:
        include: health,loggers,mappings
  endpoint:
    health:
      show-details: always
