spring:
  security:
    user:
      name: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD:admin123}
  application:
    name: ratelimiter-ai-backend
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ratelimiter?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # Prevents app from crashing if DB is not ready at startup
    continue-on-error: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}


ai:
  groq:
    api-url: https://api.groq.com/openai/v1/chat/completions
    api-key: ${GROQ_API_KEY:default-mock-key}
    model: llama3-70b-8192

server:
  port: 8080

logging:
  level:
    com.ratelimit.ai: DEBUG
    org.springframework.security: INFO

cors:
  allowed:
    origin: http://localhost:5173
